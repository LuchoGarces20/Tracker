<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floux</title>
    <link rel="icon" type="image/svg+xml" href="img/logo-floux.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main id="app-movil">
  <div class="header-app">
    <div class="brand-title">
        <img src="img/logo-light.svg" alt="Floux" class="logo-light">
        <img src="img/logo-dark.svg" alt="Floux" class="logo-dark">
    </div>
    <div class="header-actions">
        <div class="lang-flags" id="lang-container">
            <span class="flag" data-lang="es" title="Español">🇪🇸</span>
            <span class="flag" data-lang="en" title="English">🇺🇸</span>
            <span class="flag" data-lang="pt" title="Português">🇧🇷</span>
        </div>
        <button id="btn-editar-presupuesto" class="btn-icono transicion-seccion oculto">⚙️</button>
    </div>
</div>

    <section id="pantalla-simulador" class="transicion-seccion oculto">
    <h3 data-i18n="lsimTitle">LSim - Invisible Loss</h3>
    <p data-i18n="lsimDesc" class="lsim-desc"></p>
    
    <div class="form-group">
        <label data-i18n="lsimAmount">Purchase Cost</label>
        <input type="number" id="input-lsim-monto" placeholder="0" inputmode="decimal" class="input-lsim">
    </div>
    <div class="form-group">
        <label data-i18n="lsimYears">Projected Years</label>
        <input type="number" id="input-lsim-anos" value="10" inputmode="numeric" class="input-lsim">
    </div>
    <div class="form-group">
        <label data-i18n="lsimRate">Annual Return Rate (%)</label>
        <input type="number" id="input-lsim-tasa" value="8" inputmode="decimal" class="input-lsim">
    </div>
    
    <div class="calc-result mt-20">
        <span data-i18n="lsimResult">Invisible Loss (Opportunity Cost):</span>
        <strong id="display-lsim-resultado">0.00</strong>
    </div>
    
    <button id="btn-cerrar-simulador" class="btn-secundario mt-20" data-i18n="btnClose">Close</button>
    </section>

    <section id="pantalla-configuracion" class="transicion-seccion">
        <div class="form-group">
            <label data-i18n="currencyLabel">Moneda</label>
            <select id="input-moneda">
                <option value="BRL">BRL (R$)</option>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="MXN">MXN ($)</option>
                <option value="COP">COP ($)</option>
            </select>
        </div>

        <div class="onboarding-tabs">
            <button id="tab-directo" class="tab-btn active" data-i18n="tabDirect">Ya sé mi presupuesto</button>
            <button id="tab-calc" class="tab-btn" data-i18n="tabCalc">Ayúdame a calcular</button>
        </div>

        <div id="modo-directo" class="transicion-seccion">
            <div class="form-group">
                <label data-i18n="budgetLabel">Presupuesto Total para el Mes</label>
                <input type="number" id="input-presupuesto" data-i18n-ph="budgetPlaceholder" placeholder="Ej: 2000" inputmode="decimal">
            </div>
        </div>

<div id="modo-calculadora" class="transicion-seccion oculto">
    <div class="form-group">
        <label data-i18n="incomeLabel">Renta Mensual Total</label>
        <input type="number" id="input-ingresos" placeholder="Ej: 5000" inputmode="decimal" class="input-calc">
    </div>
    
    <div class="form-group">
        <label data-i18n="pctLongTerm">Inversión Largo Plazo (%) - Rec: 20%</label>
        <input type="number" id="input-pct-largo" value="20" inputmode="decimal" class="input-calc">
    </div>
    <div class="form-group">
        <label data-i18n="pctShortTerm">Inversión Corto Plazo (%) - Rec: 10%</label>
        <input type="number" id="input-pct-corto" value="10" inputmode="decimal" class="input-calc">
    </div>
    <div class="form-group">
        <label data-i18n="pctEdu">Educación (%) - Rec: 5%</label>
        <input type="number" id="input-pct-edu" value="5" inputmode="decimal" class="input-calc">
    </div>
    
    <div class="form-group">
        <label data-i18n="pctSurvival">Supervivencia (%) - Rec: 55%</label>
        <input type="number" id="input-pct-viver" value="55" inputmode="decimal" class="input-calc">
    </div>
    <div class="form-group">
        <label data-i18n="pctFree">Gastos Libres (%) - Rec: 10%</label>
        <input type="number" id="input-pct-livre" value="10" inputmode="decimal" class="input-calc">
    </div>

    <div class="form-group">
        <label data-i18n="fixedPixLabel">Renta comprometida (PIX/Boleto)</label>
        <input type="number" id="input-fijos" placeholder="Ej: 1500" inputmode="decimal" class="input-calc">
    </div>

    <div class="calc-result">
        <span data-i18n="calcResult">Valor seguro para gastar:</span>
        <strong id="display-calculado">0.00</strong>
    </div>
</div>

        <div class="form-group transicion-seccion oculto" id="area-gastos-previos">
            <label data-i18n="spentLabel">¿Ya gastaste algo este mes?</label>
            <input type="number" id="input-gastos-iniciales" value="0" inputmode="decimal">
        </div>
        <button id="btn-comenzar" class="btn-principal" data-i18n="btnStart">Guardar y Continuar</button>
    </section>

    <section id="pantalla-principal" class="transicion-seccion oculto">
        
        <div class="month-navigation" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button id="btn-prev-month" class="btn-secundario btn-pequeno" style="width: auto; margin: 0;">⬅️</button>
            <h3 id="display-current-month" style="margin: 0; font-size: 1.1rem; color: var(--text-color);">Mes</h3>
            <button id="btn-next-month" class="btn-secundario btn-pequeno" style="width: auto; margin: 0;" disabled>➡️</button>
        </div>

        <div class="grid-balances">
            <div class="balance-card highlight">
                <span class="b-title" id="titulo-limite-hoy" data-i18n="limitToday">Tu límite de hoy</span>
                <span class="b-amount" id="display-diario">0.00</span>
            </div>
            
            <div class="balance-card">
                <span class="b-title" data-i18n="remainsMonth">Restante</span>
                <span class="b-amount" id="display-mensual">0.00</span>
                <div class="custom-progress">
                    <div class="custom-progress-fill" id="progreso-mensual-fill"></div>
                </div>
            </div>

            <div class="balance-card">
                <span class="b-title" data-i18n="spentMonth">Gastado</span>
                <span class="b-amount" id="display-gastado">0.00</span>
            </div>
        </div>

        <div id="resumen-mes-pasado" class="summary-card transicion-seccion oculto">
            <h4 data-i18n="summaryTitle">Resumen del Mes</h4>
            <div class="summary-row">
                <span class="summary-label" data-i18n="summaryPerf">Rendimiento:</span>
                <span class="summary-value" id="summary-performance"></span>
            </div>
            <div class="summary-row">
                <span class="summary-label" data-i18n="summaryGreatest">Gasto Mayor:</span>
                <span class="summary-value" id="summary-largest"></span>
            </div>
            <div class="summary-row">
                <span class="summary-label" data-i18n="summaryDaily">Promedio Diario:</span>
                <span class="summary-value" id="summary-daily"></span>
            </div>
        </div>

        <hr class="divider">

        <div id="area-registrar-gasto" class="transicion-seccion">
            <h3 data-i18n="addExpenseTitle">Registrar Gasto</h3>
            <form id="form-gasto">
                <div class="form-group">
                    <input type="number" id="input-monto" data-i18n-ph="amountPlaceholder" placeholder="Monto" step="0.01" required inputmode="decimal">
                </div>
                <div class="form-group">
                    <input type="text" id="input-desc" data-i18n-ph="descPlaceholder" placeholder="Descripción" required>
                </div>
                
                <div class="form-group">
                    <select id="input-categoria"></select>
                    
                    <button type="button" id="btn-toggle-nueva-cat" class="btn-secundario btn-pequeno">✚ <span data-i18n="newCategory">Nueva Categoría</span></button>
                    <div id="area-nueva-categoria" class="nueva-cat-container transicion-seccion oculto">
                        <input type="text" id="input-nueva-cat-nombre" data-i18n-ph="catNamePlaceholder" placeholder="Nombre (ej: Gimnasio)" class="mb-5">
                        <input type="text" id="input-nueva-cat-emoji" data-i18n-ph="catEmojiPlaceholder" placeholder="Emoji (ej: 🏋️)" class="mb-5" maxlength="2">
                        <button type="button" id="btn-guardar-nueva-cat" class="btn-principal mb-0" data-i18n="btnSave" style="padding: 0.5rem; margin-bottom: 0;">Guardar</button>
                    </div>
                </div>
                
                <button type="submit" id="btn-guardar-gasto" class="btn-principal" data-i18n="btnAdd">Agregar</button>
            </form>
            <hr class="divider">
        </div>

        <h3 data-i18n="analysisTitle">Análisis del Mes</h3>
        <div class="cat-breakdown" id="grafico-categorias"></div>

        <h3 data-i18n="expensesMonth">Historial</h3>
        <ul class="log" id="lista-historial"></ul>
        <button id="btn-abrir-simulador" class="btn-secundario btn-lsim" data-i18n="btnOpenLSim">🔮 Simulador LSim</button>
        <div class="flex-gap-mt20">
            <button id="btn-exportar" class="btn-secundario mb-0" data-i18n="btnExport" style="margin-top: 0;">Exportar</button>
            <button id="btn-importar" class="btn-secundario mb-0" data-i18n="btnImport" style="margin-top: 0;">Importar</button>
            <input type="file" id="input-archivo" accept=".json" class="hidden-file">
        </div>
        
        <button id="btn-reiniciar" class="btn-secundario btn-danger-outline" data-i18n="btnReset">Borrar App</button>
    </section>
</main>
<script type="module" src="js/main.js"></script>
</body>
</html>
